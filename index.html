<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="favicon.ico" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GFGT</title>
  <meta name="description" content="A private platform for building and supporting independent ventures." />
  <style>
    :root {
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.82);
      --bubble: rgba(20, 20, 20, 0.24);
      --bubble-strong: rgba(20, 20, 20, 0.34);
      --bubble-line: rgba(255, 255, 255, 0.18);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
    }

    body {
      min-height: 100vh;
      background-image:
        linear-gradient(rgba(0,0,0,0.18), rgba(0,0,0,0.18)),
        url("background.png");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      overflow: hidden;
    }

    .wrap {
      width: 100%;
      max-width: 980px;
      display: flex;
      justify-content: center;
    }

    .hero {
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-align: center;
    }

    .bubble {
      background: var(--bubble);
      border: 1px solid var(--bubble-line);
      border-radius: 999px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .bubble.small {
      padding: 10px 18px;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.88);
    }

    .bubble.title {
      padding: 20px 34px;
    }

    .bubble.tagline {
      padding: 22px 28px;
      max-width: 760px;
    }

    .bubble.subtext {
      padding: 18px 24px;
      max-width: 640px;
      background: rgba(20, 20, 20, 0.20);
      border-radius: 32px;
    }

    .bubble.contact {
      padding: 0;
      background: var(--bubble-strong);
      overflow: hidden;
    }

    h1 {
      margin: 0;
      font-size: clamp(44px, 10vw, 86px);
      line-height: 0.95;
      font-weight: 650;
      letter-spacing: 0.08em;
    }

    .tagline-text {
      margin: 0;
      font-size: clamp(22px, 3.3vw, 34px);
      line-height: 1.35;
      font-weight: 450;
    }

    .subtext-text {
      margin: 0;
      font-size: 16px;
      line-height: 1.75;
      color: var(--muted);
    }

    .contact-link {
      display: inline-block;
      padding: 16px 28px;
      color: #ffffff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.02em;
      border: none;
      transition: transform 0.2s ease, background 0.2s ease, opacity 0.2s ease;
    }

    .contact-link:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.05);
    }

    @media (max-width: 640px) {
      body {
        padding: 18px;
        background-position: center center;
      }

      .hero {
        gap: 14px;
      }

      .bubble.title {
        padding: 18px 24px;
      }

      .bubble.tagline {
        padding: 18px 20px;
      }

      .bubble.subtext {
        padding: 16px 18px;
      }

      .subtext-text {
        font-size: 15px;
      }

      .contact-link {
        padding: 15px 24px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="bubble small">Private Platform</div>

      <div class="bubble title">
        <h1>GFGT</h1>
      </div>

      <div class="bubble tagline">
        <p class="tagline-text">A private platform for building and supporting independent ventures.</p>
      </div>

      <div class="bubble subtext">
        <p class="subtext-text">
          GFGT is an independent platform with interests across a range of businesses and projects.
        </p>
      </div>

      <div class="bubble contact">
        <a
          class="contact-link"
          href="mailto:gfgentrading@gmail.com?subject=Inquiry%20from%20GFGT%20Website"
        >
          Contact Us
        </a>
      </div>
    </section>
  </main>
</body>
</html>
